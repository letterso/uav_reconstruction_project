sampling:
  initial_fps: 20
  blur_threshold: 10
  parallax_threshold_px: 100
  output_dir: images
  fallback_fps: 30
  only_keyframes: false  # 仅提取关键帧(I帧/Intra-coded)
  start_time: null
  end_time: null

features:
  type: ORB
  max_features: 3000
  min_matches: 50

quality:
  use_ssim: false
  ssim_max: 0.98
  jpeg_quality: 98  # JPEG quality (0-100), 100 = maximum quality
